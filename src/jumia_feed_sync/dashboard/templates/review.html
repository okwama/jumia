{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Review Grid{% if run_id %} &mdash; Run #{{ run_id }}{% endif %}</h1>

{% if run_id is none %}
  <p class="text-base-content/60">No completed run yet. <a href="/run" class="link link-primary">Start one</a>.</p>
{% else %}
  <button
    type="button"
    hx-post="/review/{{ run_id }}/export"
    hx-target="#export-result"
    hx-swap="innerHTML"
    class="btn btn-secondary btn-sm mb-4"
  >
    Export approved rows
  </button>
  <div id="export-result"></div>

  <form hx-post="/review/{{ run_id }}/override" hx-target="#grid" hx-swap="innerHTML">
    <div id="grid">
      {% include "_grid.html" %}
    </div>
  </form>
{% endif %}
{% endblock %}
