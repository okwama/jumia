<!DOCTYPE html>
<html lang="en" data-theme="corporate">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jumia Feed Sync</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-base-200 min-h-screen">
  <div class="navbar bg-base-100 shadow-sm sticky top-0 z-20 px-6">
    <div class="flex-1">
      <span class="text-lg font-bold">Jumia Feed Sync</span>
    </div>
    <div class="flex-none">
      <ul class="menu menu-horizontal px-1 gap-1">
        <li><a href="/run">Run</a></li>
        <li><a href="/review/latest">Review Grid</a></li>
        <li><a href="/unresolved">Unresolved</a></li>
      </ul>
    </div>
  </div>
  <main class="p-6 max-w-6xl mx-auto">
    {% block content %}{% endblock %}
  </main>
  <script>
    // Suggestion chips (Unresolved screen) fill the adjacent confirm form
    // instead of navigating -- data attributes, not inline handlers with
    // interpolated text, so Jinja2's autoescaping is what protects this,
    // not string-building JS.
    document.body.addEventListener('click', (e) => {
      const chip = e.target.closest('.suggestion-chip');
      if (!chip) return;
      const form = chip.closest('.unresolved-group').querySelector('form');
      if (!form) return;
      form.querySelector('[name=jumia_id]').value = chip.dataset.jumiaId;
      form.querySelector('[name=jumia_label]').value = chip.dataset.jumiaLabel;
    });
  </script>
</body>
</html>
