<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jumia Feed Sync</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
  <nav class="bg-white border-b px-6 py-3 flex gap-6 sticky top-0 z-20">
    <a href="/run" class="font-semibold">Run</a>
    <a href="/review/latest">Review Grid</a>
    <a href="/unresolved">Unresolved</a>
  </nav>
  <main class="p-6">
    {% block content %}{% endblock %}
  </main>
  <script>
    // Suggestion chips (Unresolved screen) fill the adjacent confirm form
    // instead of navigating -- data attributes, not inline handlers with
    // interpolated text, so Jinja2's autoescaping is what protects this,
    // not string-building JS.
    document.body.addEventListener('click', (e) => {
      const chip = e.target.closest('.suggestion-chip');
      if (!chip) return;
      const form = chip.closest('.unresolved-group').querySelector('form');
      if (!form) return;
      form.querySelector('[name=jumia_id]').value = chip.dataset.jumiaId;
      form.querySelector('[name=jumia_label]').value = chip.dataset.jumiaLabel;
    });
  </script>
</body>
</html>
