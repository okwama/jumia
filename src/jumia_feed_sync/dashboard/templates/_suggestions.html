{% for s in suggestions %}
<button
  type="button"
  class="suggestion-chip btn btn-xs btn-outline"
  data-jumia-id="{{ s.jumia_id }}"
  data-jumia-label="{{ s.jumia_label }}"
>
  {{ s.jumia_id }} - {{ s.jumia_label }} <span class="opacity-60">({{ "%.0f"|format(s.score) }}%)</span>
</button>
{% else %}
<span class="text-base-content/40">No suggestions.</span>
{% endfor %}
