<form hx-post="/review/{{ run_id }}/edit/{{ sku | urlencode }}" hx-target="this" hx-swap="outerHTML" class="mt-2 space-y-1 bg-base-200 p-2 rounded-box">
  <input type="text" name="Name" value="{{ current.Name }}" placeholder="Name" class="input input-bordered input-xs w-full">
  <textarea name="Description" placeholder="Description" rows="2" class="textarea textarea-bordered textarea-xs w-full">{{ current.Description }}</textarea>
  <input type="text" name="MainImage" value="{{ current.MainImage }}" placeholder="Image URL" class="input input-bordered input-xs w-full">
  <button type="submit" class="btn btn-primary btn-xs">Save</button>
</form>
